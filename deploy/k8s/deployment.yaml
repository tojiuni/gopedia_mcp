apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gopedia-mcp
  name: gopedia-mcp
  namespace: gopedia
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gopedia-mcp
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gopedia-mcp
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: node-role.kubernetes.io/work
                operator: Exists
            weight: 80
      containers:
      - env:
        - name: GOPEDIA_API_URL
          value: http://gopedia-svc.gopedia-svc.svc:18787
        - name: MCP_HTTP_PORT
          value: '8081'
        - name: GARDENER_API_URL
          value: http://gardener-gopedia-svc.gardener-gopedia.svc:18880
        - name: GOPEDIA_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: gopedia-api-token
              key: access_token
        image: artifacts.toji.homes/neunexus/gopedia-mcp:337f7aa
        imagePullPolicy: IfNotPresent
        name: gopedia-mcp
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 250m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: artifacts-pull-secret
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30

